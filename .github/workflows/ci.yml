name: CI

on:
  workflow_call:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check:
          - name: Typecheck
            run: pnpm run check-types
          - name: Lint
            run: pnpm run check
          - name: Test
            run: pnpm run test
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ${{ matrix.check.name }}
        run: ${{ matrix.check.run }}
